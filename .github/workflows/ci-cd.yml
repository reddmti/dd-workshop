name: DD Workshop v2 CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DD_SERVICE: dd-workshop-api
  DD_ENV: workshop
  REGISTRY: us-central1-docker.pkg.dev/electric-loader-308712/dd-workshop
  BACKEND_IMAGE: us-central1-docker.pkg.dev/electric-loader-308712/dd-workshop/dd-workshop-backend
  FRONTEND_IMAGE: us-central1-docker.pkg.dev/electric-loader-308712/dd-workshop/dd-workshop-frontend

jobs:
  # ────────────────────────────────────
  # JOB 1: Tests + CI Visibility
  # ────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Configure Datadog Test Optimization
        uses: datadog/test-visibility-github-action@v2
        with:
          languages: python
          api_key: ${{ secrets.DD_API_KEY }}
          site: datadoghq.com
          service: dd-workshop-api
          python-tracer-version: "2.10.0"

      - name: Run tests
        env:
          DD_ENV: workshop
        run: |
          cd backend
          pytest test_main.py -v \
            --cov=. \
            --cov-report=xml:coverage.xml

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: backend/coverage.xml

      - name: Evaluate Datadog Quality Gate
        run: |
          npm install -g @datadog/datadog-ci
          datadog-ci gate evaluate
        env:
          DD_API_KEY: ${{ secrets.DD_API_KEY }}
          DD_APP_KEY: ${{ secrets.DD_APP_KEY }}
          DD_SITE: datadoghq.com
          DD_SERVICE: dd-workshop-api
          DD_ENV: workshop

  # ────────────────────────────────────
  # JOB 2: SAST Scan
  # ────────────────────────────────────
  sast:
    name: SAST Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Datadog SAST
        uses: datadog/datadog-static-analyzer-github-action@v3
        with:
          dd_api_key: ${{ secrets.DD_API_KEY }}
          dd_app_key: ${{ secrets.DD_APP_KEY }}
          dd_site: datadoghq.com
          cpu_count: 2

  # ────────────────────────────────────
  # JOB 3: Claude Analysis (solo en PR)
  # ────────────────────────────────────
  claude-analysis:
    name: Claude Analysis
    runs-on: ubuntu-latest
    if: false # desactivado temporalmente (requiere saldo en API de Anthropic)
    steps:
      - uses: actions/checkout@v4

      - name: Analyze and comment PR
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          pip install anthropic requests
          python3 << 'PYTHON'
          import anthropic, requests, os, subprocess

          diff = subprocess.run(
              ["git", "diff", "origin/main...HEAD", "--", "*.py"],
              capture_output=True, text=True
          ).stdout[:8000]

          if not diff.strip():
              exit(0)

          client = anthropic.Anthropic(api_key=os.environ["ANTHROPIC_API_KEY"])
          msg = client.messages.create(
              model="claude-opus-4-7", max_tokens=1024,
              messages=[{"role": "user", "content": f"""Eres experto en seguridad.
          Analiza este diff Python: tipo de vulnerabilidad, línea, riesgo y código corregido.
          Español, markdown, conciso. DIFF:\n{diff}"""}]
          )
          comment = f"## 🤖 Análisis — Claude AI\n\n{msg.content[0].text}\n\n---\n*Revisa también Datadog Code Analysis.*"
          headers = {"Authorization": f"Bearer {os.environ['GH_TOKEN']}", "Accept": "application/vnd.github+json"}
          requests.post(
              f"https://api.github.com/repos/{os.environ['REPO']}/issues/{os.environ['PR_NUMBER']}/comments",
              json={"body": comment}, headers=headers
          )
          PYTHON

  # ────────────────────────────────────
  # JOB 4: Build + Deploy (solo en main)
  # ────────────────────────────────────
  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: [test, sast]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Record deploy start time
        run: echo "DEPLOY_START=$(date +%s)" >> $GITHUB_ENV

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push backend
        run: |
          docker build -t ${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
                       -t ${{ env.BACKEND_IMAGE }}:latest ./backend
          docker push ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          docker push ${{ env.BACKEND_IMAGE }}:latest

      - name: Build and push frontend
        run: |
          docker build -t ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
                       -t ${{ env.FRONTEND_IMAGE }}:latest ./frontend
          docker push ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          docker push ${{ env.FRONTEND_IMAGE }}:latest

      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: dd-workshop-cluster
          location: us-central1

      - name: Install nginx ingress controller
        run: |
          kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.10.1/deploy/static/provider/cloud/deploy.yaml || true
          kubectl wait --namespace ingress-nginx \
            --for=condition=ready pod \
            --selector=app.kubernetes.io/component=controller \
            --timeout=90s || true

      - name: Deploy manifests
        run: |
          sed -i "s|dd-workshop-backend:latest|dd-workshop-backend:${{ github.sha }}|g" k8s/manifests.yaml
          sed -i "s|dd-workshop-frontend:latest|dd-workshop-frontend:${{ github.sha }}|g" k8s/manifests.yaml
          kubectl apply -f k8s/manifests.yaml
          kubectl rollout status deployment/dd-workshop-backend --timeout=120s
          kubectl rollout status deployment/dd-workshop-frontend --timeout=120s

      - name: Report deployment to Datadog DORA
        run: |
          npm install -g @datadog/datadog-ci
          datadog-ci dora deployment \
            --service dd-workshop-api \
            --env workshop \
            --started-at ${{ env.DEPLOY_START }} \
            --finished-at $(date +%s) \
            --git-repository-url https://github.com/${{ github.repository }} \
            --git-commit-sha ${{ github.sha }}
        env:
          DATADOG_API_KEY: ${{ secrets.DD_API_KEY }}

      - name: Run Synthetic Tests
        uses: DataDog/synthetics-ci-github-action@v4.0.0
        with:
          api-key: ${{ secrets.DD_API_KEY }}
          app-key: ${{ secrets.DD_APP_KEY }}
          public-ids: "i7t-w8b-bse,pi4-tmb-4cv"
          datadog-site: datadoghq.com

      - name: Get ingress IP
        run: |
          echo "Waiting for ingress IP..."
          for i in {1..20}; do
            IP=$(kubectl get svc -n ingress-nginx ingress-nginx-controller \
              -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null)
            if [ -n "$IP" ]; then
              echo "Ingress IP: $IP"
              echo "Point workshop.mmonsalves.dev to: $IP"
              break
            fi
            sleep 15
          done
